apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: fab-sop
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0      # zero-downtime rollout
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: fab-sop-rag-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: fab-sop-config
            - secretRef:
                name: fab-sop-secret
          volumeMounts:
            - name: chroma-data
              mountPath: /data/chroma
            - name: hf-cache
              mountPath: /root/.cache/huggingface
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
      volumes:
        - name: chroma-data
          persistentVolumeClaim:
            claimName: chroma-pvc
        - name: hf-cache
          persistentVolumeClaim:
            claimName: hf-cache-pvc
