# Daily neo4j-admin dump to a backup PVC at 02:00
apiVersion: batch/v1
kind: CronJob
metadata:
  name: neo4j-backup
  namespace: fab-sop
spec:
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: neo4j:5
              command:
                - /bin/sh
                - -c
                - |
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  neo4j-admin database dump neo4j \
                    --to-path=/backup/neo4j_${TIMESTAMP}.dump
              volumeMounts:
                - name: neo4j-data
                  mountPath: /data
                  readOnly: true
                - name: backup
                  mountPath: /backup
          volumes:
            - name: neo4j-data
              persistentVolumeClaim:
                claimName: neo4j-data-neo4j-0
            - name: backup
              persistentVolumeClaim:
                claimName: neo4j-backup-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: neo4j-backup-pvc
  namespace: fab-sop
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
