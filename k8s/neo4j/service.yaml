apiVersion: v1
kind: Service
metadata:
  name: neo4j-svc
  namespace: fab-sop
spec:
  selector:
    app: neo4j
  clusterIP: None    # headless — StatefulSet pods addressable by name
  ports:
    - name: http
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687
