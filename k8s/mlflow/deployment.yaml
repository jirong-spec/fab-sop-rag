apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: fab-sop
  labels:
    app: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: python:3.12-slim
          command:
            - /bin/sh
            - -c
            - |
              pip install mlflow psycopg2-binary boto3 --quiet
              mlflow server \
                --host 0.0.0.0 \
                --port 5000 \
                --backend-store-uri postgresql://mlflow:$(MLFLOW_DB_PASSWORD)@postgres-svc:5432/mlflow \
                --default-artifact-root s3://$(S3_BUCKET)/mlflow-artifacts
          ports:
            - containerPort: 5000
          env:
            - name: MLFLOW_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fab-sop-secret
                  key: MLFLOW_DB_PASSWORD
            - name: S3_BUCKET
              value: "fab-sop-mlflow"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: fab-sop-secret
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: fab-sop-secret
                  key: AWS_SECRET_ACCESS_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
