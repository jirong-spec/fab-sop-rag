# Fab SOP Knowledge Query — Single-machine Docker Compose
# Services: api · neo4j · vllm
# Start: docker compose up --build
# GPU required for the vllm service; see README for CPU-only fallback.

services:

  # ── FastAPI application ───────────────────────────────────────────────────
  api:
    build: .
    image: fab-sop-rag-api:latest
    ports:
      - "8000:8000"
    env_file: .env                   # loads all vars; overrides below win
    environment:
      # Use Docker service names, not localhost
      NEO4J_URI: bolt://neo4j:7687
      OPENAI_API_BASE: http://vllm:8000/v1
      CHROMA_DIR: /data/chroma
    volumes:
      - chroma_data:/data/chroma
      - hf_cache:/root/.cache/huggingface   # caches the embedding model
    depends_on:
      neo4j:
        condition: service_healthy
      vllm:
        # service_started (not service_healthy) so the api does not block
        # while vLLM loads the model (~3-10 min). The first /ask calls that
        # reach the LLM will fail with a 500 until vLLM is ready.
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Neo4j graph database ──────────────────────────────────────────────────
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"   # Neo4j Browser (HTTP)
      - "7687:7687"   # Bolt protocol
    environment:
      # Compose substitutes ${NEO4J_USERNAME} / ${NEO4J_PASSWORD} from .env
      NEO4J_AUTH: "${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-password123}"
      # Required by Neo4j 5 entrypoint (Community Edition still checks this)
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      # Increase heap for larger SOP graphs (tune to available RAM)
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "1g"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── vLLM (OpenAI-compatible local LLM) ───────────────────────────────────
  # Requires NVIDIA GPU + NVIDIA Container Toolkit.
  # First start will download the model (~6 GB) into the hf_cache volume.
  # Set HUGGING_FACE_HUB_TOKEN in .env if the model requires authentication.
  vllm:
    image: vllm/vllm-openai:v0.6.3.post1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

    environment:
      NVIDIA_VISIBLE_DEVICES: "0"
      CUDA_VISIBLE_DEVICES: "0"
      TRANSFORMERS_OFFLINE: "1"
      HF_HUB_OFFLINE: "1"

    volumes:
      - ./:/workspace
      - /home/jimmy/models:/llm:ro

    ports:
      - "8299:8000"
    ipc: host
    shm_size: "16gb"
    restart: unless-stopped

    command:
      - "--model"
      - "/llm/Qwen2.5-3B-Instruct"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--served-model-name"
      - "Qwen2.5-3B-Instruct"
      - "--device"
      - "cuda"
      - "--max-model-len"
      - "4096"
      - "--kv-cache-dtype"
      - "auto"
      - "--tensor-parallel-size"
      - "1"
      - "--gpu-memory-utilization"
      - "0.8"

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/v1/models || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 300s

# ── Named volumes ──────────────────────────────────────────────────────────
volumes:
  neo4j_data:
  neo4j_logs:
  chroma_data:
  hf_cache:
